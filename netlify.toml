[build]
publish = "dist"
command = "pnpm run build"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/manifest.webmanifest"

[headers.values]
Content-Type = "application/manifest+json"

[[headers]]
for = "/data/officium1962/manifest.json"
[headers.values]
Content-Type = "application/json; charset=utf-8"
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/data/officium1962/shared/manifest.json"
[headers.values]
Content-Type = "application/json; charset=utf-8"
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/data/officium1962/years/*/manifest.json"
[headers.values]
Content-Type = "application/json; charset=utf-8"
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/data/officium1962/years/*/calendar.json"
[headers.values]
Content-Type = "application/json; charset=utf-8"
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/data/officium1962/years/*/days/*.json"
[headers.values]
Content-Type = "application/json; charset=utf-8"
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/data/officium1962/shared/blocks-*.json"
[headers.values]
Content-Type = "application/json; charset=utf-8"
Cache-Control = "public, max-age=3600, must-revalidate"
